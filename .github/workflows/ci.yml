name: ci

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test
        run: go test ./...

      - name: Bash syntax check
        if: runner.os == 'Linux'
        run: bash scripts/syntax-check.sh

      - name: End-to-end verify (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/verify.sh

      - name: Bash syntax check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\syntax-check.ps1

      - name: End-to-end verify (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\verify.ps1
